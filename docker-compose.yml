services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: employee_task_management
      MYSQL_USER: etms_user
      MYSQL_PASSWORD: Etms@12345
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  backend:
    build: ./backend
    environment:
      PORT: 5000
      NODE_ENV: production
      CLIENT_ORIGIN: http://localhost:5173
      JWT_SECRET: docker-change-this-secret
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: etms_user
      DB_PASSWORD: Etms@12345
      DB_NAME: employee_task_management
    ports:
      - "5000:5000"
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
